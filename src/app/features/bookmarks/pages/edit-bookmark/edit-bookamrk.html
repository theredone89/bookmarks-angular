<ng-container>
    @if (selectedBookmark()) {
    <app-bookmark-form-panel [panelTitle]="'Edit Bookmark'" [panelDescription]="'Update title and link'" icon="edit"
        buttonText="Save Bookmark" [title]="title" [link]="link" (submit)="onSave()"></app-bookmark-form-panel>
    } 
    @else {
    <div class="container">
        <p>Loading bookmark...</p>
    </div>
    }
</ng-container>
