<div class="container">
    <mat-accordion>
    <mat-expansion-panel hideToggle expanded disabled>
        <mat-expansion-panel-header>
        <mat-panel-title> Create New Bookmark</mat-panel-title>
        <mat-panel-description> Type Bookmark name and link </mat-panel-description>
        <mat-icon>bookmark_add</mat-icon>
        </mat-expansion-panel-header>
        <div>
            <mat-form-field class="title">
                <mat-label>Title</mat-label>
                <input
                  matInput
                  placeholder="Title of the page"
                  [value]="title()"
                  (input)="title.set($any($event.target).value)"
                />
                <mat-icon matSuffix>title</mat-icon>
            </mat-form-field>
            <mat-form-field class="link">
                <mat-label>Link</mat-label>
                <input
                  matInput
                  placeholder="Link of the page"
                  [value]="link()"
                  (input)="link.set($any($event.target).value)"
                />
                <mat-icon matSuffix>link</mat-icon>
            </mat-form-field>

        <mat-action-row class="action">
        <button type="button" matButton="filled" (click)="onAddBookmark()">Add Bookmark</button>
        </mat-action-row>

        </div>
    </mat-expansion-panel>
    </mat-accordion>
</div>
